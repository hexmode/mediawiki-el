name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - '29.4'
          - '30.1'

    name: Emacs ${{ matrix.emacs-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Emacs
        uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
        env:
          # Authenticate Nix's fetchFromGitHub to avoid API rate limits
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate autoloads
        run: make autoloads-only

      - name: Run test suite
        run: make ci-test
